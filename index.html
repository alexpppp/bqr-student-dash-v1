<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f8f8f8;font-family:system-ui,sans-serif;}
.nw{padding:12px 16px 0;position:sticky;top:0;z-index:50;}
.nav{background:#c0166e;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:60px;border-radius:12px;box-shadow:0 4px 20px rgba(192,22,110,.25);}
.nr{display:flex;align-items:center;gap:10px;}
.nib{width:46px;height:46px;border-radius:50%;border:1.5px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.nib.y{background:#fc0;border-color:#d0a600;box-shadow:0 2px 0 #d0a600;}
.nib.p{background:#d850aa;border-color:#af3285;box-shadow:0 2px 0 #af3285;}
.nib svg{width:20px;height:20px;flex-shrink:0;}
.nbadge{position:absolute;top:-3px;right:-3px;background:#fff6d3;border:1.5px solid #d0a600;border-radius:20px;font-size:10px;font-weight:700;color:#333;padding:0 5px;line-height:17px;min-width:17px;text-align:center;}
.nu{background:#d850aa;border:1.5px solid #af3285;border-radius:40px;height:46px;padding:4px 14px 4px 4px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 2px 0 #af3285;}
.nua{width:36px;height:36px;border-radius:50%;background:#d4b8ea;border:1.5px solid #af3285;display:flex;align-items:center;justify-content:center;font-size:16px;}
.hero{text-align:center;padding:24px 0 16px;}
.hava{width:80px;height:80px;border-radius:50%;background:#e7e1ff;border:3px solid white;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 0 0 3px #c0166e;}
.main{padding:0 16px 100px;}
.dg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;max-width:1200px;margin:0 auto;}
@media (max-width:900px){.dg{grid-template-columns:1fr 1fr;}}
@media (max-width:600px){.dg{grid-template-columns:1fr;}}
.card{background:white;border-radius:12px;border:1px solid rgba(0,0,0,.1);padding:20px;box-shadow:0 1px 5px rgba(0,0,0,.05);}

/* ===== Onboarding nudges ===== */
.nudge-pill{display:inline-flex;align-items:center;gap:6px;background:#fff0f8;border:1.5px solid #ffcded;color:#c0166e;font-family:'Mulish',sans-serif;font-weight:800;font-size:12px;padding:6px 12px;border-radius:200px;cursor:pointer;margin-top:8px;animation:nudge-pulse 2s ease-in-out infinite;transition:transform .15s,box-shadow .15s;}
.nudge-pill:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(192,22,110,.15);}
@keyframes nudge-pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,22,110,.35);}50%{box-shadow:0 0 0 6px rgba(192,22,110,0);}}

.nudge-banner{display:flex;align-items:center;gap:8px;background:#fff0f8;border:1px solid #ffcded;border-radius:10px;padding:9px 12px;font-family:'Mulish',sans-serif;font-size:12px;font-weight:600;color:#7a0f44;line-height:1.4;margin-bottom:12px;}
.nudge-banner-ico{font-size:16px;flex-shrink:0;}

.qz-start-here{position:absolute;top:-1px;right:-1px;background:#c0166e;color:white;font-family:'Mulish',sans-serif;font-weight:800;font-size:10px;padding:3px 10px 3px 8px;border-radius:0 10px 0 10px;letter-spacing:0.3px;display:flex;align-items:center;gap:3px;z-index:2;}
.qzcard{position:relative;}

/* ===== Marketplace card (dashboard) ===== */
.mkt-strip{display:flex;gap:8px;margin-bottom:12px;}
.mkt-prev{flex:1;display:flex;flex-direction:column;gap:4px;cursor:pointer;}
.mkt-prev-img{width:100%;aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:32px;}
.mkt-prev-name{font-family:'Mulish',sans-serif;font-size:11px;font-weight:700;color:#1e1e1e;line-height:1.2;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mkt-prev-price{font-family:'Mulish',sans-serif;font-size:11px;font-weight:800;color:#c0166e;text-align:center;}
.mkt-card-empty{text-align:center;padding:14px 6px 10px;}
.mkt-card-empty-ico{font-size:24px;margin-bottom:4px;}
.mkt-card-empty-msg{font-family:'Mulish',sans-serif;font-size:12px;color:#888;line-height:1.4;}

/* ===== Wardrobe strip (post-purchase state) ===== */
.wardrobe-strip{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.wardrobe-item{width:54px;aspect-ratio:1;border-radius:10px;background:#f7f7f7;border:1.5px solid #eee;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.wardrobe-item img{width:100%;height:100%;object-fit:cover;}
.wardrobe-item.equipped{border-color:#1a8c4e;box-shadow:0 0 0 1.5px #1a8c4e;}
.wardrobe-more{width:54px;aspect-ratio:1;border-radius:10px;background:#fff0f8;border:1.5px dashed #ffcded;display:flex;align-items:center;justify-content:center;font-family:'Mulish',sans-serif;font-weight:800;font-size:12px;color:#c0166e;}

/* "Your things" grouped layout */
.yt-group{margin-bottom:12px;}
.yt-group-label{font-family:'Mulish',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.4px;color:#888;text-transform:uppercase;margin-bottom:6px;}
.yt-group-items{display:flex;gap:6px;flex-wrap:wrap;}
.yt-group-items .wardrobe-item{width:46px;}

/* ===== Purchase confirmation modal ===== */
.buy-modal-card{padding:20px 18px;text-align:center;}
.buy-modal-img{width:120px;height:120px;border-radius:14px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:60px;}
.buy-modal-name{font-family:'Mulish',sans-serif;font-weight:900;font-size:18px;color:#1e1e1e;margin-bottom:4px;}
.buy-modal-price{font-family:'Mulish',sans-serif;font-weight:800;font-size:22px;color:#c0166e;margin-bottom:12px;}
.buy-modal-bal{font-family:'Mulish',sans-serif;font-size:13px;color:#666;margin-bottom:18px;}
.buy-modal-bal strong{color:#1a8c4e;font-weight:800;}
.buy-modal-bal.afford-no strong{color:#c92626;}
.buy-modal-actions{display:flex;gap:10px;}
.buy-modal-actions button{flex:1;padding:12px;border-radius:10px;border:none;font-family:'Mulish',sans-serif;font-weight:800;font-size:14px;cursor:pointer;}
.buy-modal-cancel{background:#f0f0f0;color:#555;}
.buy-modal-cancel:hover{background:#e5e5e5;}
.buy-modal-confirm{background:#c0166e;color:white;}
.buy-modal-confirm:hover{background:#a0104e;}
.buy-modal-confirm:disabled{background:#ddd;color:#aaa;cursor:not-allowed;}

.buy-success{text-align:center;padding:24px 18px;}
.buy-success-ico{font-size:54px;margin-bottom:10px;}
.buy-success-t{font-family:'Mulish',sans-serif;font-weight:900;font-size:18px;color:#1e1e1e;margin-bottom:4px;}
.buy-success-s{font-family:'Mulish',sans-serif;font-size:13px;color:#666;margin-bottom:18px;line-height:1.5;}
.buy-success-actions{display:flex;gap:8px;flex-direction:column;}
.buy-success-actions button{padding:11px;border-radius:9px;border:none;font-family:'Mulish',sans-serif;font-weight:800;font-size:13px;cursor:pointer;}
.buy-success-equip{background:#c0166e;color:white;}
.buy-success-equip:hover{background:#a0104e;}
.buy-success-keep{background:#f0f0f0;color:#555;}
.buy-success-keep:hover{background:#e5e5e5;}

.qo{border:2px solid #eee;border-radius:11px;padding:12px 10px;cursor:pointer;text-align:center;background:white;}

.qo.ok{border-color:#3b9a22;background:#eaf7ee;}
.qo.no{border-color:#e04040;background:#fef0f0;}
.qoi{font-size:26px;margin-bottom:5px;}
.qot{font-size:12px;font-weight:800;color:#333;}
.qos{font-size:10px;color:#888;margin-top:1px;}
.qnb{margin:14px 22px;padding:11px;background:#c0166e;color:white;border:none;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;width:calc(100% - 44px);flex-shrink:0;}
.qnb:disabled{background:#ddd;color:#aaa;cursor:default;}
.qnb:not(:disabled):hover{background:#a0104e;}
.qfb{margin-top:10px;padding:9px 11px;border-radius:8px;font-size:12px;font-weight:700;}
.qfb.ok{background:#eaf7ee;color:#2a6a10;}
.qfb.no{background:#fef0f0;color:#a02020;}
.qrs{text-align:center;padding:28px 22px;}
.qrsi{font-size:56px;margin-bottom:10px;}
.qrst{font-size:21px;font-weight:800;color:#1a1a1a;margin-bottom:5px;}
.qrss{font-size:13px;color:#666;margin-bottom:18px;}
.qrsm{display:inline-flex;align-items:center;gap:7px;background:#eaf7ee;border:2px solid #b8e0a0;border-radius:14px;padding:11px 22px;font-size:22px;font-weight:800;color:#2a6a10;margin-bottom:22px;}
.qrsb{background:#c0166e;color:white;border:none;border-radius:9px;padding:11px 28px;font-size:14px;font-weight:800;cursor:pointer;}
.qrsb:hover{background:#a0104e;}
.aoi{font-size:40px;text-align:center;margin-bottom:8px;}
.aon{font-size:16px;font-weight:800;color:#1a1a1a;text-align:center;margin-bottom:3px;}
.aow{font-size:13px;color:#888;text-align:center;margin-bottom:16px;}
.aol{font-size:11px;font-weight:700;color:#888;margin-bottom:4px;display:block;}
.aoq{font-size:13px;color:#1a1a1a;font-weight:600;margin-bottom:8px;}
.aoo{border:1.5px solid #eee;border-radius:8px;padding:8px 11px;margin-bottom:6px;cursor:pointer;font-size:12px;font-weight:700;color:#444;}
.aoo:hover,.aoo.sel{border-color:#c0166e;background:#fff0f5;color:#c0166e;}
.aos{width:100%;background:#c0166e;color:white;border:none;border-radius:9px;padding:10px;font-size:13px;font-weight:800;cursor:pointer;margin-top:4px;}
.aos:hover{background:#a0104e;}
.asuc{text-align:center;padding:20px 10px;}
.asuci{font-size:50px;margin-bottom:10px;}
.asuct{font-size:18px;font-weight:800;color:#1a1a1a;margin-bottom:5px;}
.asucs{font-size:12px;color:#666;margin-bottom:18px;line-height:1.5;}
.asucb{background:#c0166e;color:white;border:none;border-radius:9px;padding:10px 24px;font-size:13px;font-weight:800;cursor:pointer;}
.cb{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e8e8e8;padding:8px 14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;z-index:100;}
.cbl{font-size:11px;color:#888;font-weight:800;}
.cbb{padding:5px 11px;border-radius:7px;font-size:11px;font-weight:700;border:1.5px solid #ddd;background:white;cursor:pointer;color:#555;}
.cbb.on{background:#1a8c4e;color:white;border-color:#1a8c4e;}
.cbb:hover:not(.on){border-color:#c0166e;color:#c0166e;}
.qzgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.qzcard{background:white;border-radius:12px;border:1.5px solid #eee;padding:18px;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.05);transition:border-color .15s,box-shadow .15s;}
.qzcard:hover:not(.done){border-color:#c0166e;box-shadow:0 3px 10px rgba(204,51,153,.1);}
.qzcard.done{border-color:#b8e0a0;background:#f6fbf0;cursor:default;}
.qzci{font-size:28px;margin-bottom:8px;}
.qzcn{font-size:14px;font-weight:800;color:#1a1a1a;margin-bottom:3px;}
.qzcs{font-size:12px;color:#999;margin-bottom:12px;}
.qzcbtn{display:inline-flex;align-items:center;gap:5px;background:#c0166e;color:white;font-size:12px;font-weight:800;padding:7px 16px;border-radius:8px;}
.qzclk{display:flex;align-items:center;justify-content:space-between;}
.sechead{font-size:16px;font-weight:800;color:#1e1e1e;margin-bottom:4px;}
.secsub{font-size:13px;color:#888;margin-bottom:14px;}
.sectitle{font-size:17px;font-weight:800;color:#1e1e1e;margin:0 0 6px;}
.secdiv{margin-bottom:28px;}
.lkbox{background:#fffbec;border:1.5px dashed #f0d060;border-radius:12px;padding:20px;text-align:center;}
.lkboxi{font-size:24px;margin-bottom:8px;}
.lkboxt{font-size:14px;font-weight:700;color:#7a5008;margin-bottom:4px;}
.lkboxs{font-size:12px;color:#b07a10;}

/* ===== Leaderboard ===== */
.lb-tabs{display:flex;gap:4px;margin-bottom:14px;background:#f5f5f5;padding:3px;border-radius:10px;}
.lb-tab{flex:1;padding:7px 8px;border:none;background:none;font-family:'Mulish',sans-serif;font-weight:700;font-size:11px;color:#666;cursor:pointer;border-radius:8px;letter-spacing:0.2px;}
.lb-tab.active{background:white;color:#c0166e;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.lb-list{display:flex;flex-direction:column;gap:6px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;border:1.5px solid transparent;background:#fafafa;}
.lb-row.you{background:#fff0f8;border-color:#ffcded;}
.lb-rank{width:24px;height:24px;border-radius:50%;background:#eee;color:#666;font-family:'Mulish',sans-serif;font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lb-rank.gold{background:#ffd84a;color:#7a5008;}
.lb-rank.silver{background:#d8d8d8;color:#444;}
.lb-rank.bronze{background:#e8a76a;color:#5a2e08;}
.lb-rank.you-rank{background:#c0166e;color:white;}
.lb-av{width:30px;height:30px;border-radius:50%;background:#e7e1ff;flex-shrink:0;overflow:hidden;}
.lb-av img{width:100%;height:100%;object-fit:cover;}
.lb-name{flex:1;font-family:'Mulish',sans-serif;font-weight:700;font-size:13px;color:#1e1e1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-name .you-tag{font-size:10px;font-weight:800;color:#c0166e;margin-left:4px;}
.lb-val{font-family:'Mulish',sans-serif;font-weight:800;font-size:13px;color:#1a8c4e;white-space:nowrap;flex-shrink:0;}

/* ===== Class strip (under hero) ===== */
.class-strip-wrap{max-width:1200px;margin:0 auto 18px;padding:0 16px;}
.class-strip-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.class-strip-title{font-family:'Mulish',sans-serif;font-weight:800;font-size:12px;color:#888;letter-spacing:0.5px;text-transform:uppercase;}
.class-strip-link{font-family:'Mulish',sans-serif;font-weight:800;font-size:12px;color:#c0166e;cursor:pointer;background:none;border:none;padding:4px 8px;border-radius:6px;display:flex;align-items:center;gap:4px;}
.class-strip-link:hover{background:#fff0f8;}
.class-strip-link svg{width:13px;height:13px;}
.class-strip{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 8px;scrollbar-width:thin;}
.class-strip::-webkit-scrollbar{height:6px;}
.class-strip::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
.cs-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:2px;width:54px;}
.cs-avatar{width:46px;height:46px;border-radius:50%;background:#e7e1ff;overflow:hidden;border:2px solid white;box-shadow:0 0 0 1.5px #e0e0e0;transition:transform .15s,box-shadow .15s;}
.cs-item:hover .cs-avatar{transform:translateY(-2px);box-shadow:0 0 0 2px #c0166e;}
.cs-item.teacher .cs-avatar{box-shadow:0 0 0 2px #fcb900;}
.cs-item.you .cs-avatar{box-shadow:0 0 0 2px #c0166e;}
.cs-avatar img{width:100%;height:100%;object-fit:cover;}
.cs-name{font-family:'Mulish',sans-serif;font-size:10px;font-weight:700;color:#555;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54px;}
.cs-item.teacher .cs-name{color:#a07000;font-weight:800;}
.cs-item.you .cs-name{color:#c0166e;font-weight:800;}

/* ===== Class photo modal ===== */
.cp-modal{width:min(1100px,calc(100vw - 32px));max-height:calc(100vh - 40px);background:white;border-radius:16px;border:4px solid #1a1a1a;overflow:hidden;display:flex;flex-direction:column;}
.cp-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
.cp-title{font-family:'Mulish',sans-serif;font-weight:900;font-size:18px;color:#1e1e1e;}
.cp-subtitle{font-family:'Mulish',sans-serif;font-size:13px;color:#888;margin-left:10px;font-weight:500;}
.cp-body{flex:1;overflow:auto;padding:60px 16px;background:linear-gradient(180deg,#f5f0fa 0%,#fafafa 60%,#fff 100%);}
.cp-rows{display:flex;flex-direction:column;gap:0;align-items:stretch;min-width:min-content;}
.cp-row{display:flex;justify-content:center;align-items:flex-end;width:100%;flex-wrap:nowrap;min-width:min-content;}
.cp-row.back{position:relative;z-index:1;}
.cp-row.middle{position:relative;z-index:2;margin-top:-18px;}
.cp-row.front{position:relative;z-index:3;margin-top:-18px;}
/* Stagger alternating rows by half-a-person width so heads sit between the row in front */
.cp-row.stagger{padding-left:58px;}
.cp-person{flex-shrink:0;width:116px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:default;margin:0 -2px;position:relative;transition:transform .15s;z-index:1;}
.cp-person:hover{transform:translateY(-8px);z-index:50;}
.cp-person-av{width:108px;height:108px;border-radius:50%;background:#e7e1ff;overflow:hidden;border:3px solid white;box-shadow:0 0 0 2px #ccc, 0 5px 14px rgba(0,0,0,.16);}
.cp-person-av img{width:100%;height:100%;object-fit:cover;}
.cp-person.teacher .cp-person-av{box-shadow:0 0 0 3px #fcb900, 0 5px 14px rgba(0,0,0,.2);}
.cp-person.you .cp-person-av{box-shadow:0 0 0 3px #c0166e, 0 5px 14px rgba(0,0,0,.2);}
/* Name tag floats ABOVE everyone via high z-index on parent during hover */
.cp-person-name{font-family:'Mulish',sans-serif;font-size:13px;font-weight:700;color:#1e1e1e;white-space:nowrap;background:white;padding:5px 12px;border-radius:200px;border:1px solid #e0e0e0;box-shadow:0 3px 10px rgba(0,0,0,.18);opacity:0;transition:opacity .15s,transform .15s;position:absolute;top:-30px;left:50%;transform:translateX(-50%) translateY(-3px);pointer-events:none;z-index:100;}
.cp-person:hover .cp-person-name{opacity:1;transform:translateX(-50%) translateY(0);}
.cp-person.teacher .cp-person-name{background:#fff8e0;border-color:#f0d060;color:#7a5008;}
.cp-person.you .cp-person-name{background:#fff0f8;border-color:#ffcded;color:#c0166e;}

/* ===== Class feed ===== */
#feedBody{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;padding-right:4px;}
#feedBody::-webkit-scrollbar{width:5px;}
#feedBody::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
.feed-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;background:#fafafa;border:1px solid #eee;animation:feed-in .35s ease-out;}
.feed-row.new{background:#fff0f8;border-color:#ffcded;}
@keyframes feed-in{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.feed-av{width:32px;height:32px;border-radius:50%;overflow:hidden;background:#e7e1ff;flex-shrink:0;}
.feed-av img{width:100%;height:100%;object-fit:cover;}
.feed-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;}
.feed-text{font-family:'Mulish',sans-serif;font-size:12px;color:#1e1e1e;line-height:1.35;}
.feed-text .feed-name{font-weight:800;}
.feed-text .feed-detail{font-weight:500;color:#555;}
.feed-meta{display:flex;align-items:center;gap:5px;}
.feed-time{font-family:'Mulish',sans-serif;font-size:10px;color:#999;}
.feed-ico{font-size:16px;flex-shrink:0;}
.feed-action-buy{background:#fff0f8;border-color:#ffcded;}
.feed-action-quiz{background:#f0fdf4;border-color:#bde5c8;}
.feed-action-milestone{background:#fff8e0;border-color:#f5d860;}
.feed-quiz-cta{display:inline-flex;align-items:center;gap:3px;background:#1a8c4e;color:white;font-family:'Mulish',sans-serif;font-weight:800;font-size:10px;padding:2px 7px;border-radius:200px;margin-left:6px;cursor:pointer;border:none;letter-spacing:0.2px;}
.feed-quiz-cta:hover{background:#127a3e;}

/* ===== BANKING MODAL - matched to Figma design ===== */
#bankOv,#bankOv *{font-family:'Mulish',system-ui,sans-serif;}
#bankTitle{font-family:'Mulish',sans-serif;font-weight:900;font-size:18px;color:#1e1e1e;letter-spacing:-0.1px;}

/* Body padding */
#bankBody{padding:0;}

/* Wallet/balance summary at top */
.bb-wrap{padding:16px 16px 8px;text-align:center;}
.bb{font-family:'Mulish',sans-serif;font-weight:600;font-size:24px;line-height:22px;color:#333;margin-bottom:8px;margin-top:8px;}
.bbs{font-family:'Mulish',sans-serif;font-weight:400;font-size:14px;line-height:18px;color:#666;}

/* Account cards side-by-side */
.bam{display:flex;gap:12px;padding:16px;}
.bac{flex:1;height:120px;border-radius:12px;overflow:hidden;position:relative;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:16px;transition:transform .15s,opacity .15s;}
.bac:hover{opacity:.92;}
.bac.ev{background:#fff1fa;border:1px solid #ffcded;box-shadow:0 2px 0 #ffcded;}
.bac.sv{background:#f0f1ff;border:1px solid #bec2ff;box-shadow:0 2px 0 #bec2ff;}
.bac.sv-locked{background:#f5f5f5;border:1px solid #e0e0e0;box-shadow:0 2px 0 #e0e0e0;cursor:default;}
.bac.sv-locked:hover{opacity:1;}
.baca{font-family:'Mulish',sans-serif;font-weight:600;font-size:20px;line-height:22px;color:#333;position:relative;z-index:2;}
.bacl{font-family:'Mulish',sans-serif;font-weight:400;font-size:14px;line-height:18px;color:#666;position:relative;z-index:2;}
/* Decorative strawberry for Everyday */
.bac.ev::before{content:"";position:absolute;bottom:-28px;left:-40px;width:110px;height:110px;background:radial-gradient(circle at 30% 30%,#ff4a95 0%,#d42f78 55%,#b02060 100%);border-radius:50% 45% 50% 45%;transform:rotate(-10deg);opacity:.85;z-index:1;box-shadow:inset 6px 6px 0 rgba(255,255,255,.2);}
.bac.ev::after{content:"";position:absolute;bottom:52px;left:10px;width:26px;height:30px;background:#3ea852;border-radius:40% 60% 20% 80%;transform:rotate(-30deg);z-index:1;}
/* Decorative coins for Savings */
.bac.sv::before{content:"";position:absolute;bottom:12px;left:8px;width:62px;height:28px;background:linear-gradient(135deg,#a5abff 0%,#7e85ff 60%,#5c63e8 100%);border-radius:50%;transform:rotate(-18deg) skewX(-4deg);opacity:.8;z-index:1;box-shadow:0 -3px 0 rgba(255,255,255,.3) inset;}
.bac.sv::after{content:"";position:absolute;bottom:26px;left:26px;width:44px;height:22px;background:linear-gradient(135deg,#bec2ff 0%,#9ca3ff 60%,#7a82e8 100%);border-radius:50%;transform:rotate(-18deg) skewX(-4deg);opacity:.9;z-index:1;}

/* Locked savings state */
.bac .locked-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative;z-index:2;}
.bac .locked-icon{font-size:22px;color:#bbb;}
.bac .locked-txt{font-family:'Mulish',sans-serif;font-size:12px;color:#999;}

/* Section heading (Upcoming payments / Recent transactions) */
.aph{font-family:'Mulish',sans-serif;font-weight:900;font-size:18px;line-height:22px;color:#1e1e1e;padding:16px 16px 0;margin-bottom:4px;}

/* Payment/transaction row */
.api{display:flex;gap:8px;align-items:flex-start;padding:8px 16px;}
.apil{display:flex;gap:8px;align-items:flex-start;flex:1;min-width:0;}
.apii{width:40px;height:40px;border-radius:50%;background:#fff4fb;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative;}
.apii.blue{background:#c9eefe;}
.apii.green{background:#e1f5d9;}
.apii.yellow{background:#fff3d0;}
.apid{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
.apin{font-family:'Mulish',sans-serif;font-weight:600;font-size:16px;line-height:20px;color:#1e1e1e;}
.apis{font-family:'Mulish',sans-serif;font-weight:400;font-size:14px;line-height:18px;color:#666;}
.apia{font-family:'Mulish',sans-serif;font-weight:600;font-size:16px;line-height:20px;color:#333;white-space:nowrap;flex-shrink:0;}
.apia.cr{color:#1a8c4e;}
.apia.db{color:#333;}

/* Transaction view header (for everyday/savings detail) */
.txh{display:flex;align-items:center;gap:12px;padding:20px 16px 8px;}
.txh-ic{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:28px;}
.txh.everyday .txh-ic{background:#fff1fa;}
.txh.savings .txh-ic{background:#f0f1ff;}
.txh-lbl{font-family:'Mulish',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.6px;color:#888;text-transform:uppercase;}
.txb{font-family:'Mulish',sans-serif;font-weight:600;font-size:24px;line-height:28px;color:#333;margin-top:2px;}
.txl{font-family:'Mulish',sans-serif;font-weight:900;font-size:18px;color:#1e1e1e;padding:20px 16px 0;margin-bottom:4px;}
.txi{display:flex;gap:8px;align-items:flex-start;padding:8px 16px;}
.txil{display:flex;gap:8px;align-items:flex-start;flex:1;min-width:0;}
.txic{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.txic.in{background:#e1f5d9;}
.txic.out{background:#fff4fb;}
.txin{font-family:'Mulish',sans-serif;font-weight:600;font-size:16px;line-height:20px;color:#1e1e1e;}
.txid{font-family:'Mulish',sans-serif;font-weight:400;font-size:14px;line-height:18px;color:#666;}
.txa{font-family:'Mulish',sans-serif;font-weight:600;font-size:16px;line-height:20px;white-space:nowrap;flex-shrink:0;align-self:center;}
.txa.cr{color:#1a8c4e;}
.txa.db{color:#333;}

/* Pay / Transfer forms */
.pform{padding:20px 16px;}
.pl{display:block;font-family:'Mulish',sans-serif;font-weight:700;font-size:12px;color:#666;letter-spacing:0.3px;text-transform:uppercase;margin:14px 0 6px;}
.pl:first-child{margin-top:0;}
.pi{width:100%;padding:12px 14px;border:1.5px solid #e6e6e6;border-radius:10px;font-family:'Mulish',sans-serif;font-size:15px;color:#1e1e1e;background:white;outline:none;transition:border-color .15s;}
.pi:focus{border-color:#c0166e;}
.pi-amt-wrap{position:relative;}
.pi-amt-wrap::before{content:"$";position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:'Mulish',sans-serif;font-size:15px;font-weight:700;color:#888;pointer-events:none;}
.pi-amt{padding-left:26px;}
.pi-bal{font-family:'Mulish',sans-serif;font-size:12px;color:#888;margin-top:6px;}
.pi-bal strong{color:#1a8c4e;font-weight:800;}
.pi-err{font-family:'Mulish',sans-serif;font-size:13px;font-weight:700;color:#c92626;background:#fef0f0;border:1px solid #ffcdcd;border-radius:8px;padding:9px 12px;margin-top:12px;display:none;}
.pi-err.show{display:block;}
.ps{width:100%;margin-top:18px;padding:13px;background:#c0166e;color:white;border:none;border-radius:10px;font-family:'Mulish',sans-serif;font-weight:800;font-size:15px;cursor:pointer;}
.ps:hover{background:#a0104e;}
.ps:disabled{background:#ddd;color:#aaa;cursor:not-allowed;}
.sl{padding:40px 24px;text-align:center;}
.sli{font-size:32px;color:#ccc;margin-bottom:10px;}
.slm{font-family:'Mulish',sans-serif;font-size:13px;color:#999;line-height:1.5;}

/* Payment success state */
.pay-success{padding:30px 22px;text-align:center;}
.pay-success-ico{font-size:54px;margin-bottom:10px;}
.pay-success-t{font-family:'Mulish',sans-serif;font-weight:900;font-size:18px;color:#1e1e1e;margin-bottom:4px;}
.pay-success-s{font-family:'Mulish',sans-serif;font-size:13px;color:#666;margin-bottom:18px;line-height:1.5;}
.pay-success-amt{font-family:'Mulish',sans-serif;font-weight:800;font-size:24px;color:#1a8c4e;margin-bottom:14px;}
.pay-success-btn{background:#c0166e;color:white;border:none;border-radius:9px;padding:11px 24px;font-family:'Mulish',sans-serif;font-weight:800;font-size:14px;cursor:pointer;}

/* Bottom nav buttons get Mulish */
.bkftab{font-family:'Mulish',sans-serif;font-weight:500;}

/* ===== AVATAR CUSTOMISER MODAL ===== */
#avOv,#avOv *{font-family:'Mulish',system-ui,sans-serif;}
.hava{cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:visible;background:#e7e1ff;}
.hava:hover{transform:scale(1.04);box-shadow:0 0 0 3px #c0166e,0 4px 16px rgba(192,22,110,.25);}
.hava-edit{position:absolute;bottom:-2px;right:-2px;width:26px;height:26px;border-radius:50%;background:#c0166e;border:2.5px solid white;display:flex;align-items:center;justify-content:center;color:white;box-shadow:0 2px 6px rgba(0,0,0,.15);z-index:5;}
.hava-edit svg{width:12px;height:12px;}

/* Avataaars image holder - scales to fill container */
.av-img{display:block;width:100%;height:100%;object-fit:cover;pointer-events:none;}
.nua .av-img{border-radius:50%;}
.hava .av-img{border-radius:50%;}

.av-tabs{display:flex;gap:0;border-bottom:1px solid #f0f0f0;padding:0 4px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;-ms-overflow-style:none;}
.av-tabs::-webkit-scrollbar{display:none;}
.av-tab{padding:12px 10px;background:none;border:none;font-family:'Mulish',sans-serif;font-weight:700;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap;flex-shrink:0;}
.av-tab.active{color:#c0166e;border-bottom-color:#c0166e;}
.av-tab:hover:not(.active){color:#555;}

.av-preview{display:flex;flex-direction:column;align-items:center;padding:18px 16px 8px;gap:6px;flex-shrink:0;}
.av-preview-circle{width:110px;height:110px;border-radius:50%;background:#e7e1ff;border:3px solid white;box-shadow:0 0 0 3px #c0166e;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}

.av-scroll{overflow-y:auto;padding:14px 16px 16px;flex:1;}
.av-section-label{font-family:'Mulish',sans-serif;font-weight:800;font-size:11px;letter-spacing:0.5px;color:#888;text-transform:uppercase;margin-bottom:10px;}

.av-opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.av-opt{aspect-ratio:1;border-radius:12px;border:2px solid #eee;background:#f7f7f7;cursor:pointer;position:relative;transition:border-color .15s,background .15s;overflow:hidden;padding:2px;}
.av-opt:hover{border-color:#c0166e;}
.av-opt.selected{border-color:#c0166e;background:#fff0f8;box-shadow:0 2px 0 #ffcded;}
.av-opt .av-opt-img{width:100%;height:100%;object-fit:cover;}
.av-opt .av-opt-swatch{width:100%;height:100%;border-radius:10px;}
.av-opt .av-opt-check{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:#c0166e;color:white;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.av-opt .av-opt-none{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:#999;background:#f0f0f0;border-radius:10px;}
.av-opt .av-opt-lock{position:absolute;inset:0;background:rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;font-size:20px;color:#aaa;border-radius:10px;}

.av-empty{text-align:center;padding:30px 20px;color:#aaa;font-size:12px;line-height:1.5;}
.av-empty-ico{font-size:28px;margin-bottom:8px;opacity:.6;}
</style>

function buildAvatarUrl() {
  // Build effective params: equipped wearables override base
  var params = {
    seed: avatar.seed,
    skinColor: avatar.skinColor,
    eyes: avatar.eyes,
    eyebrows: avatar.eyebrows,
    mouth: avatar.mouth,
    hairColor: avatar.hairColor,
    // Lock randomisation - only use the one selected option for each slot
    accessoriesProbability: 0,
    facialHairProbability: 0
  };
  // Hat or hair
  var hatId = avatar.equipped.hat;
  if (hatId) {
    var hat = AV_WEARABLES.filter(function(w){return w.id===hatId;})[0];
    params.top = hat.top;
    params.hatColor = hat.hatColor;
  } else {
    params.top = avatar.top;
  }
  // Accessories
  var accId = avatar.equipped.accessories;
  if (accId) {
    var acc = AV_WEARABLES.filter(function(w){return w.id===accId;})[0];
    params.accessories = acc.accessories;
    params.accessoriesColor = acc.accessoriesColor;
    params.accessoriesProbability = 100;
  }
  // Clothing
  var clothId = avatar.equipped.clothing;
  if (clothId) {
    var cl = AV_WEARABLES.filter(function(w){return w.id===clothId;})[0];
    params.clothing = cl.clothing;
    params.clothesColor = cl.clothesColor;
  } else {
    params.clothing = avatar.clothing;
    params.clothesColor = avatar.clothesColor;
  }
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
  }).join("&");
  return AV_API + "?" + qs;
}

  // Middle rows take the rest, split evenly across 2 middle rows.
  var TOP_BOT_STUDENTS = 5;
  var topRow = [teacher1].concat(students.slice(0, TOP_BOT_STUDENTS));
  var botRowStudents = students.slice(students.length - TOP_BOT_STUDENTS);
  var botRow = botRowStudents.concat([teacher2]);
  var middleStudents = students.slice(TOP_BOT_STUDENTS, students.length - TOP_BOT_STUDENTS);
  var midSplit = Math.ceil(middleStudents.length / 2);
  var mid1 = middleStudents.slice(0, midSplit);
  var mid2 = middleStudents.slice(midSplit);

  function personHtml(p) {
    var cls = "cp-person";
    if (p.role === "teacher") cls += " teacher";
    if (p.role === "you") cls += " you";
    var label;
    if (p.role === "you") label = "You";
    else if (p.role === "teacher") label = p.name + " (Teacher)";

    return '<div class="' + cls + '">'
      + '<div class="cp-person-av"><img src="' + p.avatarUrl + '" alt=""></div>'

// Periodically generate new fake feed events
var FAKE_FEED_TEMPLATES = [
  {action:"buy",ico:"&#x1F6CD;",options:["bought a Red Hoodie","bought Cool Shades","bought a Pink Beanie","bought Gold Shades","bought a Blazer","bought Overalls","bought a Green Beanie"]},
  {action:"quiz",ico:"&#x1F4DD;",options:["earned 2 quiz points","earned 3 quiz points","earned 5 quiz points","earned 4 quiz points","completed What is money quiz","completed Saving money quiz"]},
  {action:"transfer",ico:"&#x1F501;",options:["transferred $20 to Savings","transferred $50 to Savings","transferred $10 to Savings","moved $30 between accounts"]},
  {action:"job",ico:"&#x1F4BC;",options:["got hired as Bank teller","got hired as Shop keeper","got hired as Cafe owner","started as Photographer"]},
  {action:"milestone",ico:"&#x1F3C6;",options:["hit $1000 net worth!","reached 30 quiz points!","saved $200 in Savings!"]}
];
var feedTimer = null;
function pushFakeFeedEvent() {
  // Pick a random classmate and template
  var c = CLASSMATES[Math.floor(Math.random() * CLASSMATES.length)];
  var tpl = FAKE_FEED_TEMPLATES[Math.floor(Math.random() * FAKE_FEED_TEMPLATES.length)];
  var detail = tpl.options[Math.floor(Math.random() * tpl.options.length)];
  // Age all existing events
  feedEvents.forEach(function(e){
    e.justAdded = false;
    e.time = ageTime(e.time);
  });
  feedEvents.unshift({
    who: c.name, seed: c.seed,
    action: tpl.action, detail: detail, ico: tpl.ico,
    time: "just now", justAdded: true
  });
  // Cap at 20
  if (feedEvents.length > 20) feedEvents.length = 20;
  renderFeed();
}
function ageTime(t) {
  if (t === "just now") return "1m ago";
  var m = t.match(/^(\d+)m ago$/);
  if (m) return (parseInt(m[1], 10) + 1) + "m ago";
  return t;
}
function startFeedSimulation() {
  if (feedTimer) return;
  // Every ~1 minute, push a new event (50-70s window for slight natural variation)
  function schedule() {
    var delay = 50000 + Math.random() * 20000;
    feedTimer = setTimeout(function(){ pushFakeFeedEvent(); schedule(); }, delay);
  }
  schedule();
}
// Helper for Harry's own events to push into the feed
function pushMyEvent(action, detail, ico) {
  feedEvents.forEach(function(e){ e.justAdded = false; e.time = ageTime(e.time); });
  feedEvents.unshift({
    who: "You", seed: avatar.seed,
    action: action, detail: detail, ico: ico,
    time: "just now", justAdded: true
  });
  if (feedEvents.length > 20) feedEvents.length = 20;
  renderFeed();
}

  ownedIds.forEach(function(id){

function wearableBg(w) {

    if (w.hatColor === "ff5c5c") return "#ffe8e8";

  if (w.slot === "clothing") return "\u{1F455}";
  return "\u{1F455}";

// ===== Pay / Transfer logic =====
function showFormError(elId, msg) {
  var e = G(elId);
  if (!e) return;
  e.textContent = msg;
  e.classList.add("show");
}
function clearFormError(elId) {
  var e = G(elId);
  if (e) e.classList.remove("show");
}

function confirmPay() {
  clearFormError("payErr");
  var to = G("payTo").value;
  var amtStr = G("payAmt").value;
  var note = G("payNote").value;
  if (!to) { showFormError("payErr", "Please choose who to pay"); return; }
  var amt = parseFloat(amtStr);
  if (!amt || amt <= 0) { showFormError("payErr", "Please enter an amount greater than $0"); return; }
  if (amt > balances.everyday) {
    showFormError("payErr", "Not enough money. Your balance is $" + balances.everyday.toFixed(2));
    return;
  }
  // Deduct, log transaction
  balances.everyday = +(balances.everyday - amt).toFixed(2);
  TX_EV.unshift({ico:"&#x1F4B8;", t:"out", n:"Payment to " + to, d:"Today", a:"-$" + amt.toFixed(2)});
  pushMyEvent("buy", "paid $" + amt.toFixed(2) + " to " + to, "&#x1F4B8;");
  // Success screen
  G("bankBody").innerHTML = '<div class="pay-success">'
    + '<div class="pay-success-ico">&#x2705;</div>'
    + '<div class="pay-success-t">Payment sent!</div>'
    + '<div class="pay-success-amt">$' + amt.toFixed(2) + '</div>'
    + '<div class="pay-success-s">Paid to ' + to + (note ? '<br><em>"' + note + '"</em>' : '') + '<br>New balance: <strong>$' + balances.everyday.toFixed(2) + '</strong></div>'
    + '<button class="pay-success-btn" onclick="bankView=\'accounts\';renderBankModal()">Back to accounts</button>'
    + '</div>';
  renderBankPrev();
  renderLeaderboard();
}

function confirmTransfer() {
  clearFormError("tfErr");
  var from = G("tfFrom").value;
  var to = G("tfTo").value;
  var amtStr = G("tfAmt").value;
  if (from === to) { showFormError("tfErr", "Pick different accounts to transfer between"); return; }
  var amt = parseFloat(amtStr);
  if (!amt || amt <= 0) { showFormError("tfErr", "Please enter an amount greater than $0"); return; }
  if (amt > balances[from]) {
    showFormError("tfErr", "Not enough in your " + (from === "everyday" ? "Everyday" : "Savings") + " account. Balance: $" + balances[from].toFixed(2));
    return;
  }
  // Move money
  balances[from] = +(balances[from] - amt).toFixed(2);
  balances[to] = +(balances[to] + amt).toFixed(2);
  var fromLabel = from === "everyday" ? "Everyday" : "Savings";
  var toLabel = to === "everyday" ? "Everyday" : "Savings";
  var txEntry = {ico:"&#x1F501;", d:"Today"};
  if (from === "everyday") {
    TX_EV.unshift(Object.assign({}, txEntry, {t:"out", n:"Transfer to " + toLabel, a:"-$" + amt.toFixed(2)}));
    TX_SV.unshift(Object.assign({}, txEntry, {t:"in", n:"Transfer from " + fromLabel, a:"+$" + amt.toFixed(2)}));
  } else {
    TX_SV.unshift(Object.assign({}, txEntry, {t:"out", n:"Transfer to " + toLabel, a:"-$" + amt.toFixed(2)}));
    TX_EV.unshift(Object.assign({}, txEntry, {t:"in", n:"Transfer from " + fromLabel, a:"+$" + amt.toFixed(2)}));
  }
  pushMyEvent("transfer", "transferred $" + amt.toFixed(2) + " to " + toLabel, "&#x1F501;");
  // Success
  G("bankBody").innerHTML = '<div class="pay-success">'
    + '<div class="pay-success-ico">&#x2705;</div>'
    + '<div class="pay-success-t">Transfer complete!</div>'
    + '<div class="pay-success-amt">$' + amt.toFixed(2) + '</div>'
    + '<div class="pay-success-s">' + fromLabel + ' \u2192 ' + toLabel + '<br>Everyday: <strong>$' + balances.everyday.toFixed(2) + '</strong> &middot; Savings: <strong>$' + balances.savings.toFixed(2) + '</strong></div>'
    + '<button class="pay-success-btn" onclick="bankView=\'accounts\';renderBankModal()">Back to accounts</button>'
    + '</div>';
  renderBankPrev();
  renderLeaderboard();
}

// ===== Purchase flow =====
function openBuy(wId) {
  var item = SHOP.filter(function(i){return i.wId===wId;})[0];
  if (!item || ownedWearables[wId]) return;
  pendingPurchase = item;
  var w = AV_WEARABLES.filter(function(x){return x.id===wId;})[0];
  var prevOverrides = {};
  var prevImg = "";
  if (w) {
    if (w.slot==="hat") { prevOverrides.top = w.top; prevOverrides.hatColor = w.hatColor; }
    if (w.slot==="accessories") { prevOverrides.accessories = w.accessories; prevOverrides.accessoriesColor = w.accessoriesColor; prevOverrides.accessoriesProbability = 100; }
    if (w.slot==="clothing") { prevOverrides.clothing = w.clothing; prevOverrides.clothesColor = w.clothesColor; }
    prevImg = '<img src="' + previewUrl(prevOverrides) + '" style="width:100%;height:100%;object-fit:cover;border-radius:14px;" alt="' + item.n + '">';
  } else {
    prevImg = item.ico;
  }
  var price = item.sale || item.p;
  var canAfford = balances.everyday >= price;
  var newBal = (balances.everyday - price).toFixed(2);
  G("buyTitle").textContent = "Confirm purchase";
  G("buyBody").innerHTML = '<div class="buy-modal-card">'
    + '<div class="buy-modal-img" style="background:' + item.bg + '">' + prevImg + '</div>'
    + '<div class="buy-modal-name">' + item.n + '</div>'
    + '<div class="buy-modal-price">$' + price.toFixed(2) + '</div>'
    + '<div class="buy-modal-bal' + (canAfford ? '' : ' afford-no') + '">'
      + (canAfford
          ? 'Your balance: <strong>$' + balances.everyday.toFixed(2) + '</strong> &middot; After: $' + newBal
          : 'Not enough funds &middot; Your balance: <strong>$' + balances.everyday.toFixed(2) + '</strong>')
    + '</div>'
    + '<div class="buy-modal-actions">'
    + '<button class="buy-modal-cancel" onclick="closeModal(\'buyOv\')">Cancel</button>'
    + '<button class="buy-modal-confirm"' + (canAfford ? '' : ' disabled') + ' onclick="completePurchase()">Confirm</button>'
    + '</div></div>';
  G("buyOv").classList.remove("hidden");
}

function completePurchase() {
  if (!pendingPurchase) return;
  var item = pendingPurchase;
  var price = item.sale || item.p;
  if (balances.everyday < price) return;
  // Deduct, add to inventory, log transaction
  balances.everyday = +(balances.everyday - price).toFixed(2);
  ownedWearables[item.wId] = true;
  TX_EV.unshift({ico:"&#x1F6CD;",t:"out",n:item.n,d:"Today",a:"-$" + price.toFixed(2)});
  pushMyEvent("buy", "bought " + (/^[aeiouAEIOU]/.test(item.n) ? "an " : "a ") + item.n, "&#x1F6CD;");
  // Show success state in modal
  G("buyTitle").textContent = "Purchase complete";
  var w = AV_WEARABLES.filter(function(x){return x.id===item.wId;})[0];
  G("buyBody").innerHTML = '<div class="buy-success">'
    + '<div class="buy-success-ico">&#x1F389;</div>'
    + '<div class="buy-success-t">' + item.n + ' is yours!</div>'
    + '<div class="buy-success-s">Added to your wardrobe. Want to wear it now?</div>'
    + '<div class="buy-success-actions">'
    + '<button class="buy-success-equip" onclick="equipPurchasedAndClose(\'' + item.wId + '\',\'' + (w?w.slot:'') + '\')">Wear it now</button>'
    + '<button class="buy-success-keep" onclick="closeModal(\'buyOv\');renderMarket();renderMarketPrev();renderBankPrev();renderLeaderboard();">Keep shopping</button>'
    + '</div></div>';
  pendingPurchase = null;
}

function startQuiz(id, source, unitId) {
  if (nudges.quizStartHere) nudges.quizStartHere = false;
  currentQuiz = null; qCorrect = 0;
  if (source === "practice") {
    for (var i = 0; i < PRACTICE_QUIZZES.length; i++) {
      if (PRACTICE_QUIZZES[i].id === id) { currentQuiz = PRACTICE_QUIZZES[i]; break; }
    }
  } else {
    for (var u = 0; u < UNIT_QUIZZES.length; u++) {
      if (UNIT_QUIZZES[u].id === unitId) {
        for (var q = 0; q < UNIT_QUIZZES[u].quizzes.length; q++) {
          if (UNIT_QUIZZES[u].quizzes[q].id === id) { currentQuiz = UNIT_QUIZZES[u].quizzes[q]; break; }
        }
      }
    }
  }
  if (!currentQuiz) return;
  qIdx = 0; qAnswered = false;
  G("quizTitle").textContent = currentQuiz.title;
  G("qProg").style.width = "0%";
  G("quizOv").classList.remove("hidden");
  renderQuestion();
}

function renderQuestion() {
  if (qIdx >= currentQuiz.qs.length) { showReward(); return; }
  var q = currentQuiz.qs[qIdx]; qAnswered = false;
  G("qProg").style.width = Math.round(qIdx / currentQuiz.qs.length * 100) + "%";
  var earnBar = qCorrect > 0 ? '<div style="text-align:right;font-size:12px;font-weight:700;color:#1a8c4e;margin-bottom:12px;">$' + qCorrect + '.00 earned so far</div>' : '<div style="margin-bottom:24px;"></div>';
  var html = earnBar + '<div class="qq">' + q.q + '</div><div class="qog">';
  q.opts.forEach(function(o, i) {
    html += '<div class="qo" id="qo' + i + '" onclick="selectOpt(' + i + ')"><div class="qoi">' + o.ico + '</div><div class="qot">' + o.t + '</div><div class="qos">' + o.s + '</div></div>';
  });
  html += '</div><div id="qFb"></div>';
  G("quizBody").innerHTML = html;
  var nb = document.createElement("button");
  nb.className = "qnb"; nb.id = "qNext"; nb.disabled = true;
  nb.textContent = qIdx === currentQuiz.qs.length - 1 ? "Finish" : "Next";
  nb.onclick = function() { qIdx++; renderQuestion(); };
  G("quizBody").appendChild(nb);
}

function selectOpt(i) {
  if (qAnswered) return; qAnswered = true;
  var q = currentQuiz.qs[qIdx];
  var correct = q.opts[i].ok;
  if (correct) qCorrect++;
  q.opts.forEach(function(o, j) {
    var el = G("qo" + j);
    if (o.ok) el.classList.add("ok");
    else if (j === i) el.classList.add("no");
  });
  var fb = G("qFb");
  fb.className = "qfb " + (correct ? "ok" : "no");
  fb.textContent = correct ? "Correct! +$1.00" : 'Not quite - the right answer is "' + q.opts.filter(function(o){return o.ok;})[0].t + '"';
  G("qNext").disabled = false;
}

function showReward() {
  completedQ[currentQuiz.id] = true;
  completedQ[currentQuiz.id + "_c"] = qCorrect;
  G("qProg").style.width = "100%";
  var total = currentQuiz.qs.length;
  var pct = Math.round(qCorrect / total * 100);
  // Track quiz points (always, even if banking locked)
  harryQuizPoints += qCorrect;
  // Deposit earnings into Everyday account if banking is unlocked
  if (qCorrect > 0 && features.everyday) {
    balances.everyday = +(balances.everyday + qCorrect).toFixed(2);
    TX_EV.unshift({ico:"&#x1F4DD;",t:"in",n:currentQuiz.title,d:"Today",a:"+$" + qCorrect.toFixed(2)});
  }
  // Push to class feed
  if (qCorrect > 0) {
    pushMyEvent("quiz", "earned " + qCorrect + " quiz point" + (qCorrect===1?"":"s"), "&#x1F4DD;");
  }
  var rewardLine = features.everyday
    ? '&#x1F4B5; +$' + qCorrect + '.00 added to your bank'
    : '&#x1F4B5; +$' + qCorrect + '.00 earned';
  G("quizBody").innerHTML = '<div class="qrs"><div class="qrsi">' + (pct===100?"&#x1F3C6;":"&#x1F389;") + '</div><div class="qrst">Quiz complete!</div><div class="qrss">' + (pct===100?"Perfect score! &#x1F31F;":pct>=50?"Great effort!":"Keep practising!") + ' You got ' + qCorrect + ' of ' + total + ' correct.</div><div class="qrsm">' + rewardLine + '</div><button class="qrsb" onclick="backToQuizList()">Back to quizzes</button></div>';
  updateQDot();
  renderDashQuizzes();
  renderBankPrev();
  renderMarketPrev();
  renderLeaderboard();
}

function updateQDot() {
  var all = PRACTICE_QUIZZES.map(function(q) { return q.id; });
  if (features.unitQuizzes) {
    UNIT_QUIZZES.forEach(function(u) { u.quizzes.forEach(function(q) { all.push(q.id); }); });
  }
  var rem = all.filter(function(id) { return !completedQ[id]; }).length;
  ["navQDot","dashQDot"].forEach(function(id) {
    var d = G(id); if (d) { d.textContent = rem; d.style.display = rem===0?"none":""; }
  });
}

function renderDashQuizzes() {
  // Quiz dashboard card was removed; this is now a no-op aside from keeping
  // the nav badge counter in sync.
  var el = G("dashQuizBody");
  if (el) el.innerHTML = "";
  updateQDot();
}

// Helper: URL for a single-option preview tile (used in the picker grid)
function previewUrl(overrides) {
  var base = {
    seed: avatar.seed,
    skinColor: avatar.skinColor,
    top: avatar.top,
    hairColor: avatar.hairColor,
    eyes: avatar.eyes,
    eyebrows: avatar.eyebrows,
    mouth: avatar.mouth,
    clothing: avatar.clothing,
    clothesColor: avatar.clothesColor,
    accessoriesProbability: 0,
    facialHairProbability: 0
  };
  Object.keys(overrides).forEach(function(k){ base[k] = overrides[k]; });
  var qs = Object.keys(base).map(function(k){
    return encodeURIComponent(k) + "=" + encodeURIComponent(base[k]);
  }).join("&");
  return AV_API + "?" + qs;
}

    body.innerHTML = '<div class="av-section-label">' + slotLabel + '</div><div class="av-opt-grid">'
      // "None" tile first
      + '<div class="av-opt' + (isEquippedNone?" selected":"") + '" onclick="equipWearable(\'' + slot + '\',null)">'
      + '<div class="av-opt-none">&#8856;</div>'
      + (isEquippedNone ? '<div class="av-opt-check">\u2713</div>' : '')
      + '</div>'
      + items.map(function(w){
          var eq = avatar.equipped[slot]===w.id;
          var overrides = {};
          if (slot==="hat") { overrides.top = w.top; overrides.hatColor = w.hatColor; }
          if (slot==="accessories") { overrides.accessories = w.accessories; overrides.accessoriesColor = w.accessoriesColor; overrides.accessoriesProbability = 100; }
          if (slot==="clothing") { overrides.clothing = w.clothing; overrides.clothesColor = w.clothesColor; }
          return '<div class="av-opt' + (eq?" selected":"") + '" onclick="equipWearable(\'' + slot + '\',\'' + w.id + '\')">'
            + '<img class="av-opt-img" src="' + previewUrl(overrides) + '" loading="lazy" title="' + w.name + '">'
            + (eq ? '<div class="av-opt-check">\u2713</div>' : '')
            + '</div>';
        }).join('')
      + '</div>';
  }
}

function setAv(key, val) {
  avatar[key] = val;
  renderAllAvatars();
  renderAvBody();
}

function equipWearable(slot, id) {
  avatar.equipped[slot] = id;
  renderAllAvatars();
  renderAvBody();
  renderMarketPrev();
}

renderAllAvatars();
renderBankPrev();
renderJobPrev();
renderMarketPrev();
renderDashQuizzes();
renderLeaderboard();
renderClassStrip();
renderFeed();
startFeedSimulation();

// Backdrop click closes modal (but only on the overlay itself, not inner content)
["avOv","bankOv","marketOv","applyOv","buyOv","quizzesOv","quizOv","classPhotoOv"].forEach(function(id){
  var el = G(id);
  if (!el) return;
  el.addEventListener("click", function(e){
    if (e.target === el) closeModal(id);
  });
});
// Sync teacher unlock button states with default features
(function syncTeacherButtons(){
  var map = {everyday:"btnEv",savings:"btnSv",services:"btnSvc",careers:"btnCar",unitQuizzes:"btnUQ"};
  var labels = {everyday:"Everyday account",savings:"Savings account",services:"Services",careers:"Careers",unitQuizzes:"Unit quizzes"};
  Object.keys(map).forEach(function(f){
    var btn = G(map[f]);
    if (btn && features[f]) {
      btn.classList.add("on");
      btn.textContent = "\u2713 " + labels[f];
    }
  });
})();
</script>
